<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>You're Invited — Baachis Housewarming</title>
<meta name="description" content="Join us for the housewarming of Baachis on May 1, 3 PM onwards." />

<meta property="og:title" content="You're Invited — Baachis Housewarming" />
<meta property="og:description" content="Join us for the housewarming of Baachis on May 1, 3 PM onwards." />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Italiana&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
:root {
  --bg: #F4EBDC;
  --bg-deep: #EADFCC;
  --card: #FBF6EC;
  --ink: #4A1A14;
  --ink-soft: #7A3B2F;
  --gold: #A8853E;
  --gold-soft: #C9A560;
  --terracotta: #B85A3A;
  --muted: #8C6F5F;
  --line: rgba(74, 26, 20, 0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100%;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at top, rgba(168, 133, 62, 0.08) 0%, transparent 60%),
    radial-gradient(ellipse at bottom, rgba(184, 90, 58, 0.06) 0%, transparent 60%);
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Subtle paper grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.29  0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0.04 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  opacity: 0.5;
  mix-blend-mode: multiply;
  z-index: 0;
}

.card {
  position: relative;
  width: 100%;
  max-width: 460px;
  background: var(--card);
  padding: 56px 40px 48px;
  text-align: center;
  z-index: 1;
  box-shadow:
    0 1px 0 rgba(74, 26, 20, 0.04),
    0 30px 60px -25px rgba(74, 26, 20, 0.18);
  animation: rise 0.9s cubic-bezier(0.2, 0.7, 0.3, 1) both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Decorative arched border using SVG-style corners */
.card::before,
.card::after {
  content: '';
  position: absolute;
  left: 16px;
  right: 16px;
  height: 1px;
  background: var(--line);
}
.card::before { top: 16px; }
.card::after { bottom: 16px; }

.frame-side {
  position: absolute;
  top: 16px;
  bottom: 16px;
  width: 1px;
  background: var(--line);
}
.frame-side.left { left: 16px; }
.frame-side.right { right: 16px; }

/* Corner ornaments */
.corner {
  position: absolute;
  width: 22px;
  height: 22px;
  color: var(--gold);
}
.corner.tl { top: 8px; left: 8px; }
.corner.tr { top: 8px; right: 8px; transform: scaleX(-1); }
.corner.bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
.corner.br { bottom: 8px; right: 8px; transform: scale(-1, -1); }

/* Toran (mango leaves) */
.toran {
  display: block;
  margin: 0 auto 28px;
  width: 220px;
  height: auto;
  color: var(--terracotta);
  animation: sway 6s ease-in-out infinite;
  transform-origin: top center;
}

@keyframes sway {
  0%, 100% { transform: rotate(-1deg); }
  50% { transform: rotate(1deg); }
}

.eyebrow {
  font-family: 'Italiana', serif;
  font-size: 11px;
  letter-spacing: 0.45em;
  color: var(--ink-soft);
  text-transform: uppercase;
  margin-bottom: 18px;
}

.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 14px auto 22px;
  color: var(--gold);
}

.divider .line {
  width: 40px;
  height: 1px;
  background: currentColor;
  opacity: 0.55;
}

.divider .dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: currentColor;
}

.divider .diamond {
  width: 6px;
  height: 6px;
  background: currentColor;
  transform: rotate(45deg);
}

.house-name {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 500;
  font-size: 64px;
  line-height: 1;
  color: var(--ink);
  letter-spacing: 0.01em;
  margin-bottom: 8px;
}

.occasion {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 17px;
  color: var(--ink-soft);
  margin-bottom: 8px;
  letter-spacing: 0.04em;
}

.subtitle {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.35em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.detail-block {
  margin: 28px 0 32px;
}

.date {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 500;
  font-size: 26px;
  color: var(--ink);
  margin-bottom: 6px;
  letter-spacing: 0.02em;
}

.time {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  letter-spacing: 0.3em;
  color: var(--ink-soft);
  text-transform: uppercase;
}

.cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 32px;
  background: var(--ink);
  color: var(--card);
  text-decoration: none;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  border: 1px solid var(--ink);
  border-radius: 0;
  transition: all 0.4s cubic-bezier(0.2, 0.7, 0.3, 1);
  position: relative;
}

.cta::before,
.cta::after {
  content: '';
  position: absolute;
  width: 6px;
  height: 6px;
  border: 1px solid var(--gold);
  background: var(--card);
  transition: background 0.4s ease;
}
.cta::before { top: -4px; left: -4px; }
.cta::after { bottom: -4px; right: -4px; }

.cta:hover {
  background: var(--card);
  color: var(--ink);
}
.cta:hover::before,
.cta:hover::after {
  background: var(--ink);
}

.cta svg {
  width: 12px;
  height: 12px;
  flex-shrink: 0;
}

.signoff {
  margin-top: 32px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--muted);
}

.signoff::before,
.signoff::after {
  content: '·';
  margin: 0 12px;
  color: var(--gold);
}

@media (max-width: 480px) {
  .card { padding: 44px 28px 40px; }
  .house-name { font-size: 52px; }
  .toran { width: 180px; }
  .eyebrow { font-size: 10px; letter-spacing: 0.4em; }
  .cta { padding: 13px 24px; font-size: 11px; letter-spacing: 0.28em; }
}
</style>
</head>
<body>

<article class="card" role="article" aria-label="Housewarming invitation for Baachis">

  <!-- Corner ornaments -->
  <svg class="corner tl" viewBox="0 0 24 24" fill="none" aria-hidden="true">

    <path d="M2 8 L2 4 Q2 2 4 2 L8 2" stroke="currentColor" stroke-width="0.8" fill="none"/>
  </svg>
  <svg class="corner tr" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path d="M2 12 Q2 2 12 2" stroke="currentColor" stroke-width="0.8" fill="none"/>
    <circle cx="6" cy="6" r="0.8" fill="currentColor"/>
    <path d="M2 8 L2 4 Q2 2 4 2 L8 2" stroke="currentColor" stroke-width="0.8" fill="none"/>
  </svg>
  <svg class="corner bl" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path d="M2 12 Q2 2 12 2" stroke="currentColor" stroke-width="0.8" fill="none"/>
    <circle cx="6" cy="6" r="0.8" fill="currentColor"/>
    <path d="M2 8 L2 4 Q2 2 4 2 L8 2" stroke="currentColor" stroke-width="0.8" fill="none"/>

  <svg class="corner br" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path d="M2 12 Q2 2 12 2" stroke="currentColor" stroke-width="0.8" fill="none"/>
    <circle cx="6" cy="6" r="0.8" fill="currentColor"/>
    <path d="M2 8 L2 4 Q2 2 4 2 L8 2" stroke="currentColor" stroke-width="0.8" fill="none"/>
  </svg>

  <span class="frame-side left" aria-hidden="true"></span>

  <p class="eyebrow">You're Invited</p>

  <div class="divider" aria-hidden="true">
    <span class="line"></span>

  <div class="detail-block">

  <a class="cta" href="https://maps.app.goo.gl/YbEUEQCUyGLA329B6" target="_blank" rel="noopener noreferrer" aria-label="View location on Google Maps">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

</article>

</body>
</html>
